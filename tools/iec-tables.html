<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karatech ELV · IEC Reference Tables</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0d0e12;color:#eef0f4;font-family:Tahoma,sans-serif;padding:40px 20px}
        .container{max-width:1100px;margin:0 auto}
        .header{display:flex;justify-content:space-between;align-items:center;padding:16px 30px;background:#1e2128;border-radius:16px;margin-bottom:30px;flex-wrap:wrap;gap:10px}
        .brand{font-weight:700;font-size:1.5rem;color:#fff}
        .brand span{color:#d4af37}
        .lang-btn{background:transparent;border:1px solid #333;color:#8e95a5;padding:5px 14px;border-radius:30px;cursor:pointer;font-size:.8rem;transition:.2s}
        .lang-btn.active{background:#5b3b8c;border-color:#d4af37;color:#fff}
        .lang-btn:hover{background:#5b3b8c;color:#fff}
        .lang-switch{display:flex;gap:6px}
        h1{color:#d4af37;font-size:2.2rem;margin-bottom:10px}
        .sub{color:#8e95a5;font-size:1rem;line-height:1.8;margin-bottom:25px}
        .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
        .tab-btn{background:#1e2128;border:1px solid #333;color:#8e95a5;padding:10px 20px;border-radius:30px;cursor:pointer;transition:.2s;font-weight:600}
        .tab-btn.active{background:#5b3b8c;border-color:#d4af37;color:#fff}
        .tab-btn:hover{background:#2f3340}
        .table-wrap{overflow-x:auto;background:#1e2128;padding:20px;border-radius:16px;border:1px solid rgba(212,175,55,0.08)}
        table{width:100%;border-collapse:collapse;font-size:.9rem}
        th,td{padding:10px 14px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.06)}
        th{color:#d4af37;font-weight:600;background:#0d0e12}
        .note{color:#8e95a5;font-size:.85rem;margin-top:15px}
        .back{text-align:center;margin-top:30px}
        .back a{color:#d4af37;text-decoration:none;font-weight:600;cursor:pointer}
        .back a:hover{text-decoration:underline}
        .lang-persian{direction:rtl}
        .lang-persian .header{flex-direction:row-reverse}
        @media(max-width:768px){h1{font-size:1.8rem}.header{flex-direction:column;align-items:stretch}}
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div class="brand">KARATECH <span>ELV</span></div>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">EN</button>
            <button class="lang-btn" data-lang="fa">FA</button>
        </div>
    </div>

    <h1 id="title">📊 IEC Reference Tables</h1>
    <div class="sub" id="desc">Reference tables for cable current ratings, fuse ratings, circuit breaker ratings, and more based on IEC standards.</div>

    <div class="tabs">
        <button class="tab-btn active" data-table="cable" id="tab-cable">Cable Ratings</button>
        <button class="tab-btn" data-table="fuse" id="tab-fuse">Fuse Ratings</button>
        <button class="tab-btn" data-table="breaker" id="tab-breaker">Breaker Ratings</button>
    </div>

    <div class="table-wrap" id="table-container">
        <!-- Content will be generated by JavaScript -->
    </div>

    <div class="note" id="footnote">Based on IEC 60364, IEC 60269, and IEC 60898. Values are approximate and for reference only.</div>

    <div class="back">
        <a href="javascript:history.back()" id="backlink">← Back</a>
    </div>

</div>

<script>

            },
            fa: {

                rows: [
                    [1, 11, 8],
                    [1.5, 14, 11],
                    [2.5, 20, 15],
                    [4, 26, 20],
                    [6, 34, 26],
                    [10, 46, 36],
                    [16, 61, 47],
                    [25, 80, 63],
                    [35, 99, 78],
                    [50, 120, 94],
                    [70, 152, 119],
                    [95, 184, 144],
                    [120, 212, 166],
                    [150, 245, 192],
                    [185, 279, 218],
                    [240, 329, 257],
                    [300, 379, 296]
                ]
            }
        },
        fuse: {
            en: {
                headers: ['Fuse Size (A)', 'gG/gL (General)', 'aM (Motor)'],
                rows: [
                    [2, 2, 2],
                    [4, 4, 4],
                    [6, 6, 6],
                    [10, 10, 10],
                    [16, 16, 16],
                    [20, 20, 20],
                    [25, 25, 25],
                    [32, 32, 32],
                    [40, 40, 40],
                    [50, 50, 50],
                    [63, 63, 63],
                    [80, 80, 80],
                    [100, 100, 100],
                    [125, 125, 125],
                    [160, 160, 160],
                    [200, 200, 200],
                    [250, 250, 250],
                    [315, 315, 315],
                    [400, 400, 400]
                ]
            },
            fa: {
                headers: ['سایز فیوز (A)', 'gG/gL (عمومی)', 'aM (موتور)'],
                rows: [

                    [20, 20, 20],
                    [25, 25, 25],
                    [32, 32, 32],
                    [40, 40, 40],
                    [50, 50, 50],
                    [63, 63, 63],
                    [80, 80, 80],
                    [100, 100, 100],
                    [125, 125, 125],
                    [160, 160, 160],
                    [200, 200, 200],
                    [250, 250, 250],
                    [315, 315, 315],
                    [400, 400, 400]
                ]
            }
        },
        breaker: {
            en: {
                headers: ['Current Rating (A)', 'Typical Use'],
                rows: [
                    [6, 'Lighting, general circuits'],

                    [13, 'Lighting, general circuits'],

                    [20, 'Power circuits, small motors'],

            },
            fa: {
                headers: ['رتبه جریان (A)', 'کاربرد معمول'],
                rows: [
                    [6, 'روشنایی، مدارهای عمومی'],

                    [16, 'روشنایی، مدارهای عمومی'],
                    [20, 'مدارهای قدرت، موتورهای کوچک'],
                    [25, 'مدارهای قدرت، موتورهای کوچک'],
                    [32, 'مدارهای قدرت، موتورها'],
                    [40, 'مدارهای قدرت، موتورها'],
                    [50, 'مدارهای قدرت، بارهای بزرگ'],
                    [63, 'مدارهای قدرت، بارهای بزرگ'],
                    [80, 'توزیع اصلی فرعی'],
                    [100, 'توزیع اصلی فرعی'],

                    [200, 'توزیع اصلی'],
                    [250, 'توزیع اصلی'],
                    [315, 'توزیع اصلی'],
                    [400, 'توزیع اصلی'],
                    [500, 'توزیع اصلی'],
                    [630, 'توزیع اصلی']
                ]
            }
        }
    };

    const langData = {
        en: {
            title: '📊 IEC Reference Tables',
            desc: 'Reference tables for cable current ratings, fuse ratings, circuit breaker ratings, and more based on IEC standards.',
            footnote: 'Based on IEC 60364, IEC 60269, and IEC 60898. Values are approximate and for reference only.',
            back: '← Back',
            tabs: {
                cable: 'Cable Ratings',
                fuse: 'Fuse Ratings',
                breaker: 'Breaker Ratings'
            }
        },
        fa: {
            title: '📊 جدول‌های مرجع IEC',
            desc: 'جدول‌های مرجع برای ظرفیت جریان کابل، رتبه فیوز، رتبه کلید مدار و موارد دیگر بر اساس استانداردهای IEC.',
            footnote: 'بر اساس IEC 60364، IEC 60269 و IEC 60898. مقادیر تقریبی بوده و فقط برای مرجع هستند.',
            back: '← بازگشت',
            tabs: {
                cable: 'ظرفیت کابل',
                fuse: 'رتبه فیوز',
                breaker: 'رتبه کلید مدار'
            }
        }
    };

    function setLanguage(lang) {
        const t = langData[lang];
        if (!t) return;
        document.getElementById('title').textContent = t.title;
        document.getElementById('desc').textContent = t.desc;
        document.getElementById('footnote').textContent = t.footnote;
        document.getElementById('backlink').textContent = t.back;

        // Update tab texts
        document.getElementById('tab-cable').textContent = t.tabs.cable;
        document.getElementById('tab-fuse').textContent = t.tabs.fuse;
        document.getElementById('tab-breaker').textContent = t.tabs.breaker;

        document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
        document.body.classList.toggle('lang-persian', lang === 'fa');
        localStorage.setItem('karatech-lang', lang);
        // Refresh current table
        const activeTab = document.querySelector('.tab-btn.active');
        if (activeTab) showTable(activeTab.dataset.table);
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.onclick = function() { setLanguage(this.dataset.lang); };
    });

    const savedLang = localStorage.getItem('karatech-lang') || 'en';
    setLanguage(savedLang);

    function showTable(tableName) {
        const lang = document.querySelector('.lang-btn.active')?.dataset.lang || 'en';
        const data = tableData[tableName];
        if (!data) return;
        const t = data[lang] || data.en;
        const container = document.getElementById('table-container');

        let html = '<table><thead><tr>';
        t.headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead><tbody>';
        t.rows.forEach(row => {
            html += '<tr>';
            row.forEach(cell => html += `<td>${cell}</td>`);
            html += '</tr>';
        });
        html += '</tbody></table>';
        container.innerHTML = html;
    }

    // Tab switching
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = function() {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            showTable(this.dataset.table);
        };
    });

    // Show initial table (cable)
    showTable('cable');
</script>

</body>
</html>
