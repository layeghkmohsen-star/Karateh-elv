<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازرسی و تست</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0d0e12;color:#eef0f4;font-family:Tahoma;padding:40px}
        .container{max-width:800px;margin:0 auto}
        .back-link{color:#d4af37;text-decoration:none;font-weight:600}
        .back-link:hover{color:#fff}
        h1{color:#d4af37;margin-bottom:10px}
        .sub{color:#8e95a5;margin-bottom:25px}
        .accordion-item{background:#1e2128;border-radius:12px;margin-bottom:12px;border:1px solid rgba(212,175,55,0.1);overflow:hidden}
        .accordion-header{display:flex;justify-content:space-between;align-items:center;padding:16px 22px;cursor:pointer;transition:.2s;background:transparent;border:none;width:100%;text-align:right;font-size:1rem;color:#fff;font-weight:600;font-family:Tahoma}
        .accordion-header:hover{background:rgba(255,255,255,0.03)}
        .accordion-header i{color:#d4af37;margin-left:12px}
        .accordion-header .arrow{color:#d4af37;transition:transform .3s}
        .accordion-item.open .accordion-header .arrow{transform:rotate(180deg)}
        .accordion-body{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;padding:0 22px}
        .accordion-item.open .accordion-body{max-height:200px;padding:16px 22px 20px}
        .accordion-body a{display:block;color:#b0b8c5;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.04);text-decoration:none;transition:.2s}
        .accordion-body a:hover{color:#d4af37;padding-right:6px}
        .accordion-body a i{color:#d4af37;margin-left:10px}
    </style>
</head>
<body>
<div class="container">

    <a href="../academy/quality.html" class="back-link">← بازگشت به کنترل کیفیت</a>

    <h1>🔍 بازرسی و تست</h1>
    <div class="sub">انواع روش‌های بازرسی و تست در کنترل کیفیت را انتخاب کنید.</div>

    <div class="accordion-item">
        <button class="accordion-header" onclick="toggleAccordion(this)">
            <span><i>👁️</i> بازرسی بصری</span>
            <span class="arrow">▼</span>
        </button>
        <div class="accordion-body">
            <a href="visual-inspection.html"><i>🔗</i> مشاهده جزئیات بازرسی بصری</a>
        </div>
    </div>

    <div class="accordion-item">
        <button class="accordion-header" onclick="toggleAccordion(this)">
            <span><i>📏</i> اندازه‌گیری ابعادی</span>
            <span class="arrow">▼</span>
        </button>
        <div class="accordion-body">
            <a href="dimensional-measurement.html"><i>🔗</i> مشاهده جزئیات اندازه‌گیری ابعادی</a>
        </div>
    </div>

    <div class="accordion-item">
        <button class="accordion-header" onclick="toggleAccordion(this)">
            <span><i>⚡</i> تست الکتریکی</span>
            <span class="arrow">▼</span>
        </button>
        <div class="accordion-body">
            <a href="electrical-testing.html"><i>🔗</i> مشاهده جزئیات تست الکتریکی</a>
        </div>
    </div>

    <div class="accordion-item">
        <button class="accordion-header" onclick="toggleAccordion(this)">
            <span><i>🎯</i> تست عملکردی</span>
            <span class="arrow">▼</span>
        </button>
        <div class="accordion-body">
            <a href="functional-testing.html"><i>🔗</i> مشاهده جزئیات تست عملکردی</a>
        </div>
    </div>

</div>

<script>
function toggleAccordion(btn) {
    const item = btn.closest('.accordion-item');
    const isOpen = item.classList.contains('open');
    document.querySelectorAll('.accordion-item').forEach(el => el.classList.remove('open'));
    if (!isOpen) item.classList.add('open');
}
</script>

</body>
</html>
